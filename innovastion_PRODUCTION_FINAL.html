<title>Innovation Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-size:17px;background:#f0f2f5;color:#1a1a2e;min-height:100vh;height:100%;width:100%;overscroll-behavior:none}
:root{--acc:#e63946;--pri:#1a1a2e;--sur:#fff;--sur2:#f8f9fc;--bdr:#e4e7ed;--tx:#1a1a2e;--tx2:#6b7280;--tx3:#9ca3af;--grn:#10b981;--org:#f59e0b;--blu:#3b82f6;--pur:#8b5cf6;--gold:#f59e0b}

/* FULL SCREEN */
#root{min-height:100vh;width:100%}
.shell{display:flex;flex-direction:column;min-height:100vh;width:100%;background:#fff}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:36px 24px;background:#fff}
.login-ic{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:22px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:30px;color:#fff;margin:0 auto 18px}
.login-title{font-size:30px;font-weight:800;text-align:center;letter-spacing:-.5px}
.login-sub{font-size:17px;color:var(--tx2);margin-top:6px;text-align:center;margin-bottom:40px}
.fin-w{position:relative;margin-bottom:16px}
.fin-w svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.fin{width:100%;padding:18px 16px 18px 48px;border:2px solid var(--bdr);border-radius:14px;font-size:17px;color:var(--tx);background:#fff;outline:none;font-family:inherit;transition:border-color .2s}
.fin:focus{border-color:var(--acc)}
.btn-login{width:100%;padding:19px;background:var(--acc);color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
.btn-login:active{background:#c1121f}
.err-box{background:#fee2e2;border-radius:12px;padding:14px 16px;font-size:15px;color:#dc2626;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.switch-lnk{text-align:center;font-size:16px;color:var(--tx2);margin-top:24px}
.switch-lnk span{color:var(--acc);font-weight:700;cursor:pointer}
.dv{display:flex;align-items:center;gap:10px;margin:22px 0;color:var(--tx3);font-size:14px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* APP SHELL */
.app-shell{display:flex;flex-direction:column;min-height:100vh;width:100%}
.app-hdr{background:var(--pri);padding:16px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;min-height:60px}
.hdr-ic{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.hdr-nm{font-size:18px;font-weight:700;color:#fff;flex:1}
.hdr-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;border:2px solid rgba(255,255,255,.35);flex-shrink:0}
.hdr-bell{position:relative;cursor:pointer;color:rgba(255,255,255,.85);display:flex;align-items:center;margin-right:6px}
.ndot{width:10px;height:10px;background:var(--org);border-radius:50%;position:absolute;top:-2px;right:-3px;border:2px solid var(--pri)}
.role-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:8px;padding:3px;gap:2px;margin-right:4px}
.role-btn{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.6);transition:all .15s;font-family:inherit}
.role-btn.active{background:var(--acc);color:#fff}

/* PAGE */
.page{flex:1;padding:18px;padding-bottom:95px;overflow-y:auto}
.pg-title{font-size:22px;font-weight:800;margin-bottom:18px;letter-spacing:-.3px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:18px;font-weight:800}

/* BOTTOM NAV */
.bnav{background:#fff;border-top:1.5px solid var(--bdr);display:flex;position:sticky;bottom:0;z-index:50;padding-bottom:env(safe-area-inset-bottom,4px)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px 10px;cursor:pointer;border:none;background:transparent;color:var(--tx3);font-size:11px;gap:4px;position:relative;transition:color .15s;min-width:0;font-family:inherit}
.bnav-item.active{color:var(--acc)}
.bnav-item.active svg{stroke:var(--acc)!important}
.bnav-bdot{width:8px;height:8px;background:var(--org);border-radius:50%;position:absolute;top:8px;right:calc(50% - 14px);border:1.5px solid #fff}

/* CARDS */
.card{background:#fff;border:1.5px solid var(--bdr);border-radius:16px;padding:18px;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1.5px solid var(--bdr);border-radius:14px;padding:16px}
.stat-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-lbl{font-size:13px;color:var(--tx2);margin-top:3px}

/* IDEA CARDS */
.idea-list{display:flex;flex-direction:column;gap:12px}
.idea-item{background:#fff;border:1.5px solid var(--bdr);border-radius:16px;padding:16px;cursor:pointer}
.idea-item:active{background:var(--sur2)}
.idea-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.idea-title{font-size:17px;font-weight:700;line-height:1.3;flex:1}
.idea-desc{font-size:14px;color:var(--tx2);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vote-pill{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:22px;border:2px solid var(--bdr);background:#fff;cursor:pointer;font-size:15px;font-weight:700;color:var(--tx2);transition:all .15s;font-family:inherit}
.vote-pill.voted{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:4px 9px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}
.bgg{background:#dcfce7;color:#16a34a}.brr{background:#fee2e2;color:#dc2626}
.bbb{background:#dbeafe;color:#1d4ed8}.bpu{background:#ede9fe;color:#7c3aed}
.boo{background:#ffedd5;color:#ea580c}.bgr{background:#f3f4f6;color:#6b7280}.bgld{background:#fef3c7;color:#92400e}
.impact-bronze{background:#fdf4ec;color:#92400e;border:2px solid #d97706;padding:4px 11px;border-radius:22px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.impact-silver{background:#f1f5f9;color:#475569;border:2px solid #94a3b8;padding:4px 11px;border-radius:22px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.impact-gold{background:#fef3c7;color:#92400e;border:2px solid #fbbf24;padding:4px 11px;border-radius:22px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.pts-pill{background:#ede9fe;color:#5b21b6;padding:4px 10px;border-radius:22px;font-size:12px;font-weight:700;display:inline-flex;align-items:center}

/* BADGE GRID */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.badge-item{background:var(--sur2);border:2px solid var(--bdr);border-radius:14px;padding:12px 8px;text-align:center;transition:all .15s}
.badge-item.earned{background:#fef3c7;border-color:#fde68a;cursor:pointer}
.badge-emoji{font-size:28px;display:block;margin-bottom:5px}
.badge-nm{font-size:11.5px;font-weight:700;line-height:1.3;color:var(--tx)}
.badge-lbl{font-size:11px;color:var(--tx3);margin-top:2px}
.badge-new{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;display:inline-block;margin-top:4px}

/* PEOPLE */
.person-card{background:#fff;border:1.5px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:12px}
.p-acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.pab{padding:13px 8px;border-radius:11px;border:2px solid var(--bdr);background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--tx2);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .15s}
.pab:active{background:var(--sur2)}.pab.d{color:#dc2626;border-color:#fca5a5}.pab.d:active{background:#fee2e2}.pab.g{color:#92400e;border-color:#fde68a}.pab.g:active{background:#fef3c7}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1.5px solid var(--bdr)}
.lb-row:last-child{border-bottom:none}

// Returns a promise that resolves once window.firebase is available
function waitForFirebase(maxWait) {
  return new Promise(function(resolve) {
    if (typeof firebase !== 'undefined') { resolve(true); return; }
    var waited = 0;
    var interval = setInterval(function() {
      waited += 100;
      if (typeof firebase !== 'undefined') {
        clearInterval(interval);
        resolve(true);
      } else if (waited >= (maxWait || 15000)) {
        clearInterval(interval);
        console.warn('Firebase SDK did not load in time - falling back to localStorage');
        resolve(false);
      }
    }, 100);
  });
}

var _firebaseReady = false;
var _db = null;

async function ensureFirebase() {
  if (_firebaseReady) return true;
  var loaded = await waitForFirebase(15000);
  if (!loaded) return false;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);

    _db.settings({ experimentalForceLongPolling: true, merge: true });
    _firebaseReady = true;
    console.log('Firebase ready');

    return false;

}

async function loadState(){

  if(window._fbLoad) return await window._fbLoad();
  try{const ls=localStorage.getItem('innov_prod_v1');if(ls) return JSON.parse(ls);}catch(e){}
  return null;
}
async function saveState(){
  const data={people:S.people,ideas:S.ideas,anns:S.anns,notifs:S.notifs,requests:S.requests||[],ids:S.ids,dataVersion:DATA_VERSION};
  if(window._fbSave) await window._fbSave(data);
  // Also save to localStorage as backup
  try{localStorage.setItem('innov_prod_v1',JSON.stringify(data));}catch(e){}
}

async function init(){
  try{localStorage.removeItem('innov_v7');localStorage.removeItem('innov_v8');}catch(e){}
  // Test Firebase connectivity first
  console.log('Initializing Innovation...');
  const saved=await loadState();
  if(saved&&saved.people&&saved.people.length>0){
    // Reject stale demo data or wrong version
    var staleE=['sarah@innovastion.com','marcus@innovastion.com','aisha@innovastion.com'];
    var isOld=saved.people.some(function(p){return staleE.indexOf(p.email)>-1;});
    var oldVer=(saved.dataVersion||'')!==DATA_VERSION;
    if(isOld){
      console.log('Old demo data detected - starting fully fresh');
    } else if(oldVer){
      // Version bump: keep all users but wipe ideas, anns, notifs, requests
      console.log('Version updated - keeping users, resetting content');
      S.people=saved.people;
      // Reset IDs but keep people IDs intact
      var maxPid=saved.people.reduce(function(m,p){return Math.max(m,p.id||0);},1);
      S.ids={nPid:maxPid+1,nIid:1,nAid:2,nNid:1,nRid:1};
      // Fix up each person - reset points/badges/votes, keep name/email/dept/role/password
      S.people.forEach(function(p){
        if(!p.earnedBadges) p.earnedBadges=[];
        if(!p.newBadges) p.newBadges=[];
        p.points=0; p.totalVotes=0; p.ideas=0;
        p.vouchers=[]; p.earnedBadges=[]; p.newBadges=[];
      });
      // Save the cleaned state back to Firebase
      setTimeout(async function(){await saveState();console.log('Clean state saved to Firebase');},1500);
    } else {
      S.people=saved.people;S.ideas=saved.ideas||[];S.anns=saved.anns||[];S.notifs=saved.notifs||[];S.requests=saved.requests||[];S.ids=saved.ids||{nPid:2,nIid:1,nAid:2,nNid:1,nRid:1};
      S.people.forEach(p=>{if(!p.earnedBadges) p.earnedBadges=[];if(!p.newBadges) p.newBadges=[];if(p.points==null) p.points=0;if(p.totalVotes==null) p.totalVotes=0;});
    }
    // Always ensure Michaela has correct account
    var _ma=S.people.find(function(p){return p.email.toLowerCase()==='eklandmichaela24@gmail.com';});
    if(!_ma){S.people.unshift({id:1,name:'Michaela Ekland',email:'eklandmichaela24@gmail.com',password:'Michaela',dept:'Admin/Assistent',role:'admin',ideas:0,totalVotes:0,points:0,status:'active',vouchers:[],earnedBadges:[],newBadges:[]});}
    else{if(_ma.role!=='admin')_ma.role='admin';_ma.password='Michaela';}
    S.ideas.forEach(i=>{if(!i.docReqs) i.docReqs=[];if(!i.sharedDocs) i.sharedDocs=[];if(!i.comments) i.comments=[];if(!i.voters) i.voters=[];if(i.points==null) i.points=0;});
  } else {
    S.people=JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
    S.ideas=JSON.parse(JSON.stringify(DEFAULT_IDEAS));
    S.anns=JSON.parse(JSON.stringify(DEFAULT_ANNS));
    S.notifs=JSON.parse(JSON.stringify(DEFAULT_NOTIFS));
    S.ids={nPid:2,nIid:1,nAid:2,nNid:1,nRid:1};
    // No default ideas
    await saveState();
  }
  S.navHistory=[];S.scr='login';re();
  // Live listener: keeps all devices in sync without disturbing the current session
  if(window._fbListen){
    let _lastSaveTs = 0; // avoid echoing our own saves back
    window._fbListen((data)=>{
      if(S.scr!=='app') return;
      const now = Date.now();
      // Ignore if we saved within the last 2 seconds (it's our own write coming back)
      if(now - _lastSaveTs < 2000) return;

      const prevUid   = S.uid;
      const prevModal = S.modal;
      const prevEt    = S.et;
      const prevPg    = S.pg;
      const prevScr   = S.scr;

      // Merge data - preserve current user's local state
      S.people   = data.people   || S.people;
      S.ideas    = data.ideas    || S.ideas;
      S.anns     = data.anns     || S.anns;
      S.notifs   = data.notifs   || S.notifs;
      S.requests = data.requests || S.requests || [];
      S.ids      = data.ids      || S.ids;

      // Restore session
      S.uid   = prevUid;
      S.modal = prevModal;
      S.et    = prevEt;
      S.pg    = prevPg;
      S.scr   = prevScr;

      // Ensure data integrity
      S.people.forEach(p=>{
        if(!p.earnedBadges) p.earnedBadges=[];
        if(!p.newBadges)    p.newBadges=[];
        if(p.points==null)  p.points=0;
        if(p.totalVotes==null) p.totalVotes=0;
      });
      S.ideas.forEach(i=>{
        if(!i.docReqs)   i.docReqs=[];
        if(!i.sharedDocs) i.sharedDocs=[];
        if(!i.comments)  i.comments=[];
        if(!i.voters)    i.voters=[];
        if(i.points==null) i.points=0;
      });
      re();
    });

    // Patch saveState to track timestamp so we can ignore our own echoes
    const _origSave = saveState;
    window.saveState = async function(){
      _lastSaveTs = Date.now();
      await _origSave();
    };
    saveState = window.saveState;
  }
}

function checkBadges(pid){
  const p=S.people.find(x=>x.id===pid);if(!p) return;
  if(!p.earnedBadges) p.earnedBadges=[];if(!p.newBadges) p.newBadges=[];
  const myIdeas=S.ideas.filter(i=>i.authorId===pid);
  const implIdeas=myIdeas.filter(i=>i.status==='Implemented');
  const highIdeas=myIdeas.filter(i=>i.impact==='Gold');
  const highImpl=implIdeas.filter(i=>i.impact==='Gold');
  const voteCount=p.totalVotes||0;
  const checks=[
    {id:'first_idea',cond:myIdeas.length>=1},
    {id:'first_high',cond:highIdeas.length>=1},
    {id:'five_ideas',cond:myIdeas.length>=5},
    {id:'ten_ideas',cond:myIdeas.length>=10},
    {id:'first_impl',cond:implIdeas.length>=1},
    {id:'first_high_impl',cond:highImpl.length>=1},
    {id:'five_impl',cond:implIdeas.length>=5},
    {id:'vote10',cond:voteCount>=10},
    {id:'vote25',cond:voteCount>=25},
    {id:'vote30',cond:voteCount>=30},
    {id:'first_reward',cond:(p.vouchers||[]).length>=1},
    {id:'pts2000',cond:(p.points||0)>=2000},
    {id:'pts2500',cond:(p.points||0)>=2500},
    {id:'pts3000',cond:(p.points||0)>=3000},
    {id:'pts3000plus',cond:(p.points||0)>3000},
  ];
  let newOnes=[];
  checks.forEach(c=>{
    if(c.cond&&!p.earnedBadges.includes(c.id)){
      p.earnedBadges.push(c.id);p.newBadges.push(c.id);newOnes.push(c.id);
      const bInfo=ALL_BADGES.find(b=>b.id===c.id);
      addN(pid,'badge',`You earned the "${bInfo?.name}" badge! ${bInfo?.emoji} Tap to claim your sweet treat.`);
      S.people.filter(x=>x.id!==pid).forEach(other=>addN(other.id,'badgeAnnounce',`${p.name} earned the "${bInfo?.name}" badge! ${bInfo?.emoji}`));
    }
  });
  if(newOnes.length>0) S.pendingBadge={pid,badgeIds:newOnes};
}

function backBtn(){

function bDash(){
  const iv=S.ideas,tv=iv.reduce((a,i)=>a+i.votes,0),impl=iv.filter(i=>i.status==='Implemented').length;
  const top=[...iv].sort((a,b)=>b.votes-a.votes).slice(0,4);
  const cc={};iv.forEach(i=>{cc[i.category]=(cc[i.category]||0)+1});const sc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const _seen=new Set();
  const recentAnns=S.notifs.filter(n=>{
    if(n.type!=='newIdea'&&n.type!=='badgeAnnounce') return false;
    const k=(n.text||'').substring(0,50);
    if(_seen.has(k)) return false;
    _seen.add(k);return true;
  }).slice(0,5);
  return`<div class="stat-grid">
    <div class="stat-card"><div class="stat-ic" style="background:#fee2e2;color:#dc2626">${sv('bulb',22)}</div><div class="stat-val">${iv.length}</div><div class="stat-lbl">Ideas</div></div>
    <div class="stat-card"><div class="stat-ic" style="background:#dbeafe;color:#1d4ed8">${sv('ppl',22)}</div><div class="stat-val">${S.people.filter(p=>p.status==='active').length}</div><div class="stat-lbl">Members</div></div>
    <div class="stat-card"><div class="stat-ic" style="background:#dcfce7;color:#16a34a">${sv('hrt',22)}</div><div class="stat-val">${tv}</div><div class="stat-lbl">Votes</div></div>
    <div class="stat-card"><div class="stat-ic" style="background:#ede9fe;color:#7c3aed">${sv('aw',22)}</div><div class="stat-val">${impl}</div><div class="stat-lbl">Implemented</div></div>
  </div>
  ${recentAnns.length>0?`<div class="card"><div class="sec-title" style="margin-bottom:12px">Recent activity</div>${recentAnns.map(n=>`<div style="padding:10px 0;border-bottom:1.5px solid var(--bdr);font-size:15px;color:var(--tx2)">${n.text}</div>`).join('')}</div>`:''}
  <div class="card"><div class="sec-title" style="margin-bottom:14px">Top ideas</div>
    ${top.map((idea,i)=>{const a=S.people.find(p=>p.id===idea.authorId);const medals=['🥇','🥈','🥉'];return`<div class="lb-row" onclick="om('viewIdea',${idea.id})" style="cursor:pointer"><div class="lb-rank ${i<3?`top${i+1}`:''}">${i<3?medals[i]:`#${i+1}`}</div><div style="width:32px;height:32px;border-radius:50%;background:${gac(a?.name||'')};color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${ini(a?.name||'?')}</div><div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${idea.title}</div><div style="font-size:13px;color:var(--tx2);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">${idea.category}${idea.impact?impBdg(idea.impact):''}</div></div><div style="font-size:20px;font-weight:800;color:var(--acc);flex-shrink:0">${idea.votes}</div></div>`}).join('')}
  </div>
  <div class="card"><div class="sec-title" style="margin-bottom:14px">By category</div>${sc.map(([cat,cnt])=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:4px"><span style="font-weight:700">${cat}</span><span style="color:var(--tx2)">${cnt}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(cnt/sc[0][1]*100)}%;background:var(--acc)"></div></div></div>`).join('')}</div>`;
}

function bPeople(){

  function pendingHtml(p){

    var rows=pend.map(function(v){
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid #fed7aa">'
        +'<div style="font-size:14px;font-weight:600">'+v.prize+'</div>'
        +'<button onclick="adminConfirmClaim('+p.id+','+v.id+')" style="padding:8px 14px;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Mark claimed</button>'

      <div style="width:50px;height:50px;border-radius:50%;background:${gac(p.name)};color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0">${ini(p.name)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:800">${p.name}</div><div style="font-size:14px;color:var(--tx2)">${p.dept}</div><div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap">${rbdg(p.role)}<span class="bdg ${p.status==='active'?'bgg':'bgr'}">${p.status}</span></div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:20px;font-weight:800;color:#7c3aed">${p.points||0}</div><div style="font-size:12px;color:var(--tx3)">pts</div></div>
    </div>
    <div style="font-size:14px;color:var(--tx2);margin-bottom:12px;word-break:break-all">${p.email}</div>

      <button class="pab g" onclick="om('sendVoucher',${p.id})">${sv('gift',16)} Voucher</button>
      <button class="pab d" onclick="delPerson(${p.id})">${sv('tr',16)} Delete</button>

function bAnnounce(){
  return`${backBtn()}${isAdminView()?`<div class="sec-hdr" style="margin-bottom:16px"><div class="sec-title">Announcements</div></div>`:'<div class="pg-title">Announcements</div>'}

    return`<div class="ann-card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">${avDiv}<div style="flex:1"><div style="font-size:17px;font-weight:800">${a.title}</div><div style="font-size:13px;color:var(--tx2)">${auth?.name} · ${a.created}</div></div>${isAdminView()?`<button class="btn-ic" style="width:36px;height:36px;border-color:transparent" onclick="delAnn(${a.id})">${sv('tr',16)}</button>`:''}</div><div style="font-size:16px;color:var(--tx2);line-height:1.6;margin-bottom:14px">${a.body}</div><div class="react-row">${[['like','👍'],['fire','🔥'],['clap','👏']].map(([r,e])=>`<button class="react-btn ${a.myReaction===r?'active':''}" onclick="reactAnn(${a.id},'${r}')"><span style="font-size:18px">${e}</span>${a.reactions[r]||0}</button>`).join('')}</div></div>`;

function bindFiles(){
  document.querySelectorAll('input[type=file][data-type]').forEach(inp=>{
    inp.onchange=async function(e){
      const file=e.target.files[0];if(!file) return;
      const ideaId=parseInt(inp.dataset.ideaid);const idea=S.ideas.find(i=>i.id===ideaId);if(!idea) return;
      const ftype=file.type.startsWith('image/')?'image':'doc';
      const fsize=file.size>1048576?(file.size/1048576).toFixed(1)+' MB':Math.round(file.size/1024)+' KB';
      const dataURL=await new Promise(function(resolve){
        const reader=new FileReader();
        reader.onload=function(ev){resolve(ev.target.result);};
        reader.onerror=function(){resolve(null);};
        reader.readAsDataURL(file);
      });
      const fileId=Date.now();
      idea.comments.push({id:fileId,uid:S.uid,text:'',adminOnly:false,ts:now2(),type:'file',ftype,fname:file.name,fsize,dataURL:dataURL});
      idea.sharedDocs.push({id:fileId,name:file.name,by:S.uid,date:tod(),ftype,dataURL:dataURL});
      if(inp.dataset.type==='docreq'){const dr=idea.docReqs.find(d=>d.id===parseInt(inp.dataset.drid));if(dr) dr.status='uploaded';}
      const notify=new Set();if(idea.authorId!==S.uid) notify.add(idea.authorId);S.people.filter(p=>p.role==='admin'&&p.id!==S.uid).forEach(a=>notify.add(a.id));
      notify.forEach(uid=>addN(uid,'comment',`${cu()?.name||'?'} shared a file on "${idea.title}"`,ideaId));
      await saveState();
      toast('"'+file.name+'" uploaded!');
      re();
      // Scroll sheet to bottom so newly uploaded file is visible
      setTimeout(function(){
        var s=document.querySelector('.sheet');
        if(s) s.scrollTop=s.scrollHeight;
      }, 60);
    };
  });
}

window.doLogin=async function(){
  // Read BOTH fields immediately before any async ops wipe the DOM
  const email=(document.getElementById('le')?.value||'').trim().toLowerCase();
  const pw=(document.getElementById('lp')?.value||'').trim();
  if(!email){S.loginErr='Please enter your email address.';re();return}

  // Show loading state
  const btn=document.getElementById('loginBtn');
  if(btn){btn.textContent='Signing in...';btn.disabled=true;btn.style.opacity='0.7';}

  // Always reload from Firebase before checking - ensures we have the latest data
  // (e.g. if someone signed up from another device)
  try {
    const freshData = await window._fbLoad();
    if(freshData && freshData.people && freshData.people.length>0){
      var sc=['sarah@innovastion.com','marcus@innovastion.com','aisha@innovastion.com'];
      var isStale=freshData.people.some(function(p){return sc.indexOf(p.email)>-1;});
      var badVer=(freshData.dataVersion||'')!==DATA_VERSION;
      if(isStale){
        console.log('Old demo data in Firebase - saving clean defaults');
        await saveState();
      } else if(badVer){
        // Version bump: keep people, wipe content
        S.people=freshData.people;
        var maxP=freshData.people.reduce(function(m,p){return Math.max(m,p.id||0);},1);
        S.ids={nPid:maxP+1,nIid:1,nAid:2,nNid:1,nRid:1};
        S.people.forEach(function(p){
          if(!p.earnedBadges)p.earnedBadges=[];
          if(!p.newBadges)p.newBadges=[];
          p.points=0;p.totalVotes=0;p.ideas=0;
          p.vouchers=[];p.earnedBadges=[];p.newBadges=[];
        });
        await saveState();
      } else {
        S.people=freshData.people;S.ideas=freshData.ideas||S.ideas;S.anns=freshData.anns||S.anns;
        S.notifs=freshData.notifs||S.notifs;S.requests=freshData.requests||S.requests||[];S.ids=freshData.ids||S.ids;
        S.people.forEach(p=>{if(!p.earnedBadges)p.earnedBadges=[];if(!p.newBadges)p.newBadges=[];if(p.points==null)p.points=0;if(p.totalVotes==null)p.totalVotes=0;});
      }
      var ma=S.people.find(function(p){return p.email.toLowerCase()==='eklandmichaela24@gmail.com';});
      if(!ma){S.people.unshift({id:1,name:'Michaela Ekland',email:'eklandmichaela24@gmail.com',password:'Michaela',dept:'Admin/Assistent',role:'admin',ideas:0,totalVotes:0,points:0,status:'active',vouchers:[],earnedBadges:[],newBadges:[]});await saveState();}
      else{var chg=false;if(ma.role!=='admin'){ma.role='admin';chg=true;}if(ma.password!=='Michaela'){ma.password='Michaela';chg=true;}if(chg)await saveState();}
    }
  } catch(e){ console.warn('Fresh load failed on login, using cached:', e); }

  const m = S.people.find(p=>p.email.toLowerCase()===email);
  if(!m){
    S.loginErr='No account found. Please check your email or ask your admin to add you.';
    if(btn){btn.textContent='Sign in';btn.disabled=false;btn.style.opacity='1';}
    re();return;
  }
  if(m.password && m.password!==pw){
    S.loginErr='Incorrect password. Please try again.';
    if(btn){btn.textContent='Sign in';btn.disabled=false;btn.style.opacity='1';}
    re();return;
  }

  S.uid       = m.id;
  S.scr       = 'app';
  S.loginErr  = '';
  S.viewMode  = m.role==='admin'?'admin':'user';
  S.pg        = m.role==='admin'?'dashboard':'ideas';
  S.navHistory= [];

  if(m.newBadges && m.newBadges.length>0){
    // Only show popup for badges that haven't already been requested & processed
    const unprocessed=m.newBadges.filter(function(bid){
      const existingReq=(S.requests||[]).find(function(r){
        return r.pid===m.id && r.badgeId===bid && r.status!=='pending';
      });
      return !existingReq;
    });
    if(unprocessed.length>0) S.pendingBadge={pid:m.id,badgeIds:unprocessed};
  }
  re();
  toast('Welcome, '+m.name.split(' ')[0]+'!');
}

  const idx=idea.voters.indexOf(S.uid);

window.setImpact=async function(id,impact){
  const idea=S.ideas.find(i=>i.id===id);if(!idea) return;
  const oldPts=idea.points||0;const newPts=impact?IMPACT_PTS[impact]||0:0;
  idea.impact=impact||null;idea.points=newPts;
  const author=S.people.find(p=>p.id===idea.authorId);
  if(author){
    // Recalculate points from scratch to avoid drift
    const authorIdeas=S.ideas.filter(i=>i.authorId===author.id);
    author.points=authorIdeas.reduce((sum,i)=>sum+(i.points||0),0);
    checkBadges(idea.authorId);
  }
  if(impact) addN(idea.authorId,'status',`Your idea "${idea.title}" rated ${impact} impact — +${newPts} points!`,id);
  await saveState();toast(`Impact set: ${impact} (+${newPts}pts)`);re();
}

  const idea=S.ideas.find(function(i){return i.id===id;});
  if(!idea) return;
  // Confirm
  if(!confirm('Delete "'+idea.title+'"? This cannot be undone.')) return;
  const authorId=idea.authorId;
  const author=S.people.find(function(p){return p.id===authorId;});
  // Remove the idea
  S.ideas=S.ideas.filter(function(i){return i.id!==id;});
  if(author){
    // Subtract points this idea contributed
    if(idea.impact && idea.points>0){
      author.points=Math.max(0,(author.points||0)-idea.points);
    }
    // Subtract votes this idea received from author's totalVotes
    if(idea.votes>0){
      author.totalVotes=Math.max(0,(author.totalVotes||0)-idea.votes);
    }
    // Recalculate idea count
    author.ideas=S.ideas.filter(function(i){return i.authorId===authorId;}).length;
    // Revoke badges that no longer apply - recompute from scratch
    // Save old badges so we can notify of any revoked ones
    var oldBadges=author.earnedBadges?author.earnedBadges.slice():[];
    author.earnedBadges=[];
    author.newBadges=[];
    // Re-run badge check with updated data (re-awards only what still qualifies)
    var myIdeas=S.ideas.filter(function(i){return i.authorId===authorId;});
    var implIdeas=myIdeas.filter(function(i){return i.status==='Implemented';});
    var highIdeas=myIdeas.filter(function(i){return i.impact==='Gold';});
    var highImpl=implIdeas.filter(function(i){return i.impact==='Gold';});
    var voteCount=author.totalVotes||0;
    var pts=author.points||0;
    var badgeChecks=[
      {id:'first_idea',cond:myIdeas.length>=1},
      {id:'first_high',cond:highIdeas.length>=1},
      {id:'five_ideas',cond:myIdeas.length>=5},
      {id:'ten_ideas',cond:myIdeas.length>=10},
      {id:'first_impl',cond:implIdeas.length>=1},
      {id:'first_high_impl',cond:highImpl.length>=1},
      {id:'five_impl',cond:implIdeas.length>=5},
      {id:'vote10',cond:voteCount>=10},
      {id:'vote25',cond:voteCount>=25},
      {id:'vote30',cond:voteCount>=30},
      {id:'first_reward',cond:(author.vouchers||[]).length>=1},
      {id:'pts2000',cond:pts>=2000},
      {id:'pts2500',cond:pts>=2500},
      {id:'pts3000',cond:pts>=3000},
      {id:'pts3000plus',cond:pts>3000},
    ];
    badgeChecks.forEach(function(c){
      if(c.cond) author.earnedBadges.push(c.id);
    });
    // Find revoked badges and notify
    var revoked=oldBadges.filter(function(bid){return author.earnedBadges.indexOf(bid)<0;});
    if(revoked.length>0){
      revoked.forEach(function(bid){
        var b=ALL_BADGES.find(function(x){return x.id===bid;});
        if(b) addN(authorId,'badge','The "'+b.name+'" badge was removed because the qualifying idea was deleted.');
      });
    }
    // Remove any treat requests linked to revoked badges
    S.requests=S.requests.filter(function(req){
      if(req.type==='treat'&&req.pid===authorId&&revoked.indexOf(req.badgeId)>-1) return false;
      return true;
    });
  }
  // Remove treat requests specifically for this idea if any
  S.requests=S.requests.filter(function(req){return req.ideaId!==id;});
  S.modal=null;
  await saveState();
  toast('Idea deleted and stats updated.');
  re();
}

window.testEmail=async function(){
  const addr = document.getElementById('testEmailAddr')?.value?.trim();
  const btn  = document.getElementById('testEmailBtn');
  const res  = document.getElementById('testEmailResult');
  if(!addr || !addr.includes('@')){ toast('Enter a valid email address'); return; }

  if(btn){ btn.textContent='Sending...'; btn.disabled=true; btn.style.opacity='0.7'; }
  if(res){ res.style.display='none'; }

  try {
    if(typeof emailjs === 'undefined'){
      throw new Error('EmailJS SDK not loaded. Check your internet connection.');
    }
    emailjs.init(EMAILJS_PUBLIC_KEY);
    const result = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name:    'Test User',
      department: 'Test Department',
      app_url:    window.location.href,
      to_email:   addr,
    });
    if(res){
      res.style.display='block';
      res.style.color='#16a34a';
      res.innerHTML='✓ Email sent successfully! Check '+addr+' (status: '+result.status+')';
    }
    toast('Test email sent to '+addr+' ✓');
  } catch(e){
    const errMsg = e.text || e.message || JSON.stringify(e);
    console.error('Email test failed:', e);
    if(res){
      res.style.display='block';
      res.style.color='#dc2626';
      res.innerHTML='✗ Failed: '+errMsg+'<br><br>'+
        '<strong>Common fixes:</strong><br>'+
        '• Check your EmailJS public key is correct<br>'+
        '• Make sure service <em>service_sxlf86o</em> is connected<br>'+
        '• Template <em>template_9clcnhc</em> must have "To Email" set to <strong>{{to_email}}</strong><br>'+
        '• Check EmailJS dashboard for error logs';
    }
    toast('Email failed - see details on screen');
  } finally {
    if(btn){ btn.textContent='Send test email'; btn.disabled=false; btn.style.opacity='1'; }
  }
};

window.markRequest=async function(rid,status){
  if(!S.requests) return;
  const req=S.requests.find(function(r){return r.id===rid;});
  if(!req) return;
  req.status=status;
  // Also update the underlying voucher if it's a voucher request
  if(req.type==='voucher'){
    const p=S.people.find(function(x){return x.id===req.pid;});
    const v=p&&p.vouchers?p.vouchers.find(function(x){return x.id===req.vid;}):null;
    if(v) v.adminClaimed=true;
    if(p) addN(p.id,'voucher','Your prize "'+req.prize+'" has been '+status+' by your manager!');
  }
  if(req.type==='treat'){
    const p=S.people.find(function(x){return x.id===req.pid;});
    if(p){
      addN(p.id,'badge','Your sweet treat for "'+req.badgeName+'" has been '+status+' by your manager! '+req.badgeEmoji);
      // Clear from newBadges so popup doesn't reappear on next login
      if(p.newBadges) p.newBadges=p.newBadges.filter(function(id){return id!==req.badgeId;});
    }
  }
  await saveState();
  toast('Marked as '+status+'!');
  re();
};
